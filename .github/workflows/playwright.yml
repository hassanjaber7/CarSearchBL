name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
  schedule:
    - cron: '*/15 * * * *'

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    permissions:
      contents: write  # This allows pushing to the repository
    if: github.repository != 'hassanjaber7/CarSearchBL' || true
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Run Playwright tests
      run: npx playwright test
    
    # Upload the JSON file as an artifact
    - name: Upload listings JSON
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: listings-data
        path: listings.json
        retention-days: 30
    
    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30

    - name: Commit and push updated listings
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add listings.json
        git status
        git commit -m "Update listings data [skip ci]" || echo "No changes to commit"
        git push